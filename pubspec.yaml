name: Heroi_Impostos
description: "Heroi - Jogo Educativo sobre Impostos"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0
  fl_chart: ^1.2.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  http: '>=1.0.0'
  uuid: '>=3.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/LOGO_JOGO_AGT_TAXA_AQUI-2.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/LOGO_JOGO_AGT_TAXA_AQUI-2.png"

  
    
   